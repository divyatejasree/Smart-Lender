<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Smart Lender</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
  <main class="app-shell">
    <section class="workspace">
      <aside class="summary-panel">
        <p class="eyebrow">Credit Decisioning</p>
        <h1>Smart Lender</h1>
        <p class="summary-copy">Applicant risk scoring for faster loan approval decisions.</p>
        <div class="metric-strip" aria-label="Model summary">
          <div>
            <span>XGBoost</span>
            <strong>Preferred</strong>
          </div>
          <div>
            <span>Output</span>
            <strong>Approve / Reject</strong>
          </div>
        </div>
      </aside>

      <section class="form-panel" aria-labelledby="form-title">
        <div class="panel-heading">
          <p class="eyebrow">Applicant Details</p>
          <h2 id="form-title">Loan Application</h2>
        </div>

        <form action="{{ url_for('predict') }}" method="post" class="loan-form">
          <div class="field-grid">
            <label>
              Gender
              <select name="gender">
                <option value="Male">Male</option>
                <option value="Female">Female</option>
              </select>
            </label>

            <label>
              Married
              <select name="married">
                <option value="Yes">Yes</option>
                <option value="No">No</option>
              </select>
            </label>

            <label>
              Dependents
              <select name="dependents">
                <option value="0">0</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3+">3+</option>
              </select>
            </label>

            <label>
              Education
              <select name="education">
                <option value="Graduate">Graduate</option>
                <option value="Not Graduate">Not Graduate</option>
              </select>
            </label>

            <label>
              Employment
              <select name="self_employed">
                <option value="No">Salaried</option>
                <option value="Yes">Self-employed</option>
              </select>
            </label>

            <label>
              Property Area
              <select name="property_area">
                <option value="Urban">Urban</option>
                <option value="Semiurban">Semiurban</option>
                <option value="Rural">Rural</option>
              </select>
            </label>

            <label>
              Applicant Income
              <input type="number" name="applicant_income" min="0" step="1" value="6500" required>
            </label>

            <label>
              Coapplicant Income
              <input type="number" name="coapplicant_income" min="0" step="1" value="2200" required>
            </label>

            <label>
              Loan Amount
              <input type="number" name="loan_amount" min="1" step="1" value="145" required>
            </label>

            <label>
              Loan Term
              <select name="loan_amount_term">
                <option value="120">120 months</option>
                <option value="180">180 months</option>
                <option value="240">240 months</option>
                <option value="300">300 months</option>
                <option value="360" selected>360 months</option>
                <option value="480">480 months</option>
              </select>
            </label>

            <label>
              Credit History
              <select name="credit_history">
                <option value="1">Good credit history</option>
                <option value="0">No credit history</option>
              </select>
            </label>
          </div>

          <div class="actions">
            <button type="reset" class="secondary-button">Reset</button>
            <button type="submit" class="primary-button">Predict Approval</button>
          </div>
        </form>
      </section>
    </section>
  </main>
</body>
</html>
